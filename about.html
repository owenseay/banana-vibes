<script>
(function() {
  const canvas = document.getElementById('ghost-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  let w, h;
  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const img = new Image();
  img.src = 'banana.png';

  const b = {
    x: Math.random() * w,
    y: Math.random() * h,
    size: 280,
    heading: Math.random() * Math.PI * 2,
    speed: 0.06,
    turnRate: 0.15,
    turnFreq: 0.04,
    turnPhase: Math.random() * Math.PI * 2,
    spinRate: 0.015,
    angle: Math.random() * Math.PI * 2,
    opacity: 0.12
  };

  function loop(t) {
    ctx.clearRect(0, 0, w, h);
    if (!img.complete) { requestAnimationFrame(loop); return; }

    const time = t * 0.001;
    b.heading += Math.sin(time * b.turnFreq + b.turnPhase) * b.turnRate * 0.016;
    b.x += Math.cos(b.heading) * b.speed;
    b.y += Math.sin(b.heading) * b.speed;
    b.angle += b.spinRate * 0.016;

    // toroidal wrap
    if (b.x < -b.size) b.x = w + b.size;
    if (b.x > w + b.size) b.x = -b.size;
    if (b.y < -b.size) b.y = h + b.size;
    if (b.y > h + b.size) b.y = -b.size;

    ctx.save();
    ctx.globalAlpha = b.opacity;
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);
    ctx.drawImage(img, -b.size / 2, -b.size / 2, b.size, b.size);
    ctx.restore();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
